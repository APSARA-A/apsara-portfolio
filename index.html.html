<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APSARA A. | AI + Full Stack Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00f5ff;
  --magenta:#ff00aa;
  --green:#00ff88;
  --dark:#020a0f;
  --darker:#010608;
  --panel:#0a1a24;
  --panel2:#081520;
  --border:#00f5ff33;
  --border2:#00f5ff66;
  --text:#c8e8f0;
  --textdim:#5a8a9a;
  --font-mono:'Share Tech Mono',monospace;
  --font-title:'Orbitron',sans-serif;
  --font-body:'Rajdhani',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:var(--font-body);}

/* CANVAS BACKGROUND */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* GRID OVERLAY */
.grid-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);
  background-size:50px 50px;
}

/* SCANLINE */
.scanline{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
}

/* MAIN LAYOUT */
#app{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border2);
  background:rgba(2,10,15,0.9);backdrop-filter:blur(10px);
  font-family:var(--font-mono);font-size:11px;color:var(--textdim);
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.logo{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px var(--cyan);}
.sys-info{display:flex;gap:12px;font-size:10px;}
.sys-info span{color:var(--textdim);}
.sys-info b{color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:20px;}
.topbar-link{
  color:var(--textdim);text-decoration:none;font-size:11px;letter-spacing:1px;
  border:1px solid var(--border);padding:4px 10px;
  transition:all 0.3s;cursor:pointer;
}
.topbar-link:hover{color:var(--cyan);border-color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
#clock{color:var(--green);font-family:var(--font-mono);font-size:12px;}

/* MAIN CONTENT AREA */
#main{flex:1;display:flex;overflow:hidden;position:relative;}

/* NODE GRAPH AREA */
#node-area{flex:1;position:relative;overflow:hidden;}
#node-canvas{width:100%;height:100%;}

/* PANEL */
#panel{
  width:480px;min-width:480px;height:100%;overflow-y:auto;
  background:rgba(8,21,32,0.97);border-left:1px solid var(--border2);
  display:flex;flex-direction:column;
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);
  scrollbar-width:thin;scrollbar-color:var(--cyan) transparent;
}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-track{background:transparent;}
#panel::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px;}

#panel.hidden{transform:translateX(100%);}

.panel-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  background:rgba(0,245,255,0.03);position:sticky;top:0;z-index:10;
  backdrop-filter:blur(10px);
}
.panel-tag{font-family:var(--font-mono);font-size:10px;color:var(--magenta);letter-spacing:2px;margin-bottom:6px;}
.panel-title{font-family:var(--font-title);font-size:20px;font-weight:700;color:#fff;letter-spacing:1px;}
.panel-subtitle{font-size:13px;color:var(--textdim);margin-top:4px;font-family:var(--font-mono);}
.panel-close{
  position:absolute;top:18px;right:20px;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border2);color:var(--textdim);cursor:pointer;
  font-size:14px;transition:all 0.2s;
}
.panel-close:hover{color:var(--cyan);border-color:var(--cyan);}

.panel-body{padding:24px;flex:1;}

/* PANEL SECTIONS */
.p-section{margin-bottom:28px;}
.p-label{font-family:var(--font-mono);font-size:10px;color:var(--cyan);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.p-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.p-text{font-size:15px;line-height:1.7;color:var(--text);}

/* SKILL BARS */
.skill-item{margin-bottom:12px;}
.skill-name{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--textdim);margin-bottom:5px;}
.skill-name b{color:var(--text);}
.skill-track{height:4px;background:rgba(0,245,255,0.08);border-radius:0;overflow:hidden;}
.skill-fill{height:100%;border-radius:0;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.skill-fill.cyan{background:linear-gradient(90deg,var(--cyan),#0088aa);}
.skill-fill.magenta{background:linear-gradient(90deg,var(--magenta),#aa0066);}
.skill-fill.green{background:linear-gradient(90deg,var(--green),#008844);}

/* TAGS */
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px;}
.tag{
  font-family:var(--font-mono);font-size:10px;letter-spacing:1px;
  padding:5px 12px;border:1px solid;
  transition:all 0.3s;cursor:default;
}
.tag.c{color:var(--cyan);border-color:var(--cyan)33;}
.tag.m{color:var(--magenta);border-color:var(--magenta)33;}
.tag.g{color:var(--green);border-color:var(--green)33;}
.tag:hover{box-shadow:0 0 12px currentColor;}

/* PROJECT CARDS */
.proj-card{
  border:1px solid var(--border);padding:16px;margin-bottom:14px;
  background:rgba(0,245,255,0.02);position:relative;overflow:hidden;
  transition:all 0.3s;
}
.proj-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--cyan);
}
.proj-card.m::before{background:var(--magenta);}
.proj-card.g::before{background:var(--green);}
.proj-card.dim::before{background:var(--textdim);}
.proj-card:hover{border-color:var(--border2);background:rgba(0,245,255,0.05);}
.proj-name{font-family:var(--font-title);font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:1px;}
.proj-desc{font-size:13px;color:var(--textdim);line-height:1.6;margin-bottom:10px;}
.proj-stack{display:flex;flex-wrap:wrap;gap:6px;}
.proj-tag{font-family:var(--font-mono);font-size:9px;padding:3px 8px;border:1px solid var(--border);color:var(--textdim);}
.proj-status{
  position:absolute;top:12px;right:12px;font-family:var(--font-mono);font-size:9px;
  padding:3px 8px;letter-spacing:1px;
}
.proj-status.live{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid var(--green)33;}
.proj-status.soon{background:rgba(255,165,0,0.1);color:#ffaa00;border:1px solid #ffaa0033;}

/* CONTACT LINKS */
.contact-link{
  display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);
  margin-bottom:10px;text-decoration:none;color:var(--text);transition:all 0.3s;
  font-family:var(--font-mono);font-size:12px;
}
.contact-link:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.05);}
.contact-icon{font-size:18px;width:24px;text-align:center;}

/* STATUS BAR */
#statusbar{
  height:28px;display:flex;align-items:center;padding:0 24px;gap:20px;
  border-top:1px solid var(--border);background:rgba(2,10,15,0.9);
  font-family:var(--font-mono);font-size:10px;color:var(--textdim);flex-shrink:0;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;};}

/* WELCOME SCREEN */
#welcome{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
  background:var(--darker);display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1s;
}
#welcome.fade{opacity:0;pointer-events:none;}
.welcome-logo{font-family:var(--font-title);font-size:clamp(28px,5vw,52px);font-weight:900;color:#fff;letter-spacing:6px;text-align:center;margin-bottom:8px;}
.welcome-logo span{color:var(--cyan);text-shadow:0 0 30px var(--cyan);}
.welcome-sub{font-family:var(--font-mono);font-size:13px;color:var(--textdim);letter-spacing:3px;margin-bottom:48px;text-align:center;}
.boot-lines{width:400px;max-width:90vw;margin-bottom:32px;}
.boot-line{font-family:var(--font-mono);font-size:11px;color:var(--textdim);margin-bottom:4px;opacity:0;animation:fadeIn 0.3s forwards;}
.boot-line .ok{color:var(--green);}
.boot-line .warn{color:#ffaa00;}
@keyframes fadeIn{to{opacity:1;}}
.boot-bar-track{width:400px;max-width:90vw;height:2px;background:rgba(0,245,255,0.1);}
.boot-bar-fill{height:100%;background:var(--cyan);width:0;transition:width 0.1s;box-shadow:0 0 10px var(--cyan);}
.enter-btn{
  font-family:var(--font-title);font-size:13px;letter-spacing:3px;padding:14px 40px;
  border:1px solid var(--cyan);color:var(--cyan);background:transparent;cursor:pointer;
  opacity:0;transition:all 0.3s;margin-top:24px;
  text-shadow:0 0 10px var(--cyan);
}
.enter-btn:hover{background:rgba(0,245,255,0.1);box-shadow:0 0 20px var(--cyan)33;}
.enter-btn.show{opacity:1;}

/* NODE TOOLTIP */
#tooltip{
  position:absolute;background:rgba(8,21,32,0.95);border:1px solid var(--border2);
  padding:8px 12px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);
  pointer-events:none;z-index:50;display:none;letter-spacing:1px;
}

/* CURSOR TRAIL */
.cursor-dot{
  position:fixed;width:6px;height:6px;background:var(--cyan);border-radius:50%;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  transition:opacity 0.5s;
}

/* MOBILE */
@media(max-width:768px){
  #panel{width:100%;min-width:0;position:fixed;top:0;left:0;z-index:50;}
  .panel-hidden-mobile{transform:translateY(100%);}
  #welcome .boot-lines,#welcome .boot-bar-track{width:90vw;}
}
</style>
</head>
<body>

<!-- CANVAS BG -->
<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<!-- WELCOME SCREEN -->
<div id="welcome">
  <div class="welcome-logo">APSARA<span>.</span>A</div>
  <div class="welcome-sub">// INITIALIZING PORTFOLIO SYSTEM //</div>
  <div class="boot-lines" id="boot-lines"></div>
  <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar"></div></div>
  <button class="enter-btn" id="enter-btn" onclick="enterPortfolio()">[ ENTER ]</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-left">
      <div class="logo">APSARA.A</div>
      <div class="sys-info">
        <span>STATUS: <b>ONLINE</b></span>
        <span>MODE: <b>PORTFOLIO</b></span>
        <span>BUILD: <b>2026</b></span>
      </div>
    </div>
    <div class="topbar-right">
      <a class="topbar-link" href="https://linkedin.com/in/apsara11" target="_blank">LINKEDIN</a>
      <a class="topbar-link" href="https://github.com/APSARA-A" target="_blank">GITHUB</a>
      <div id="clock">--:--:--</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="node-area">
      <canvas id="node-canvas"></canvas>
      <div id="tooltip"></div>
    </div>

    <!-- PANEL -->
    <div id="panel" class="hidden">
      <div class="panel-header">
        <div class="panel-tag" id="panel-tag">// NODE_DATA //</div>
        <div class="panel-title" id="panel-title">LOADING</div>
        <div class="panel-subtitle" id="panel-subtitle"></div>
        <div class="panel-close" onclick="closePanel()">✕</div>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div style="display:flex;align-items:center;gap:6px;"><div class="status-dot"></div><span>SYSTEM ACTIVE</span></div>
    <span>NODE_GRAPH v2.5</span>
    <span id="status-msg">SELECT A NODE TO EXPLORE</span>
  </div>
</div>

<script>
// ============ CLOCK ============
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    n.getHours().toString().padStart(2,'0')+':'+
    n.getMinutes().toString().padStart(2,'0')+':'+
    n.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock,1000);updateClock();

// ============ PARTICLE BG ============
const bgCanvas=document.getElementById('bg-canvas');
const bgCtx=bgCanvas.getContext('2d');
let particles=[];
function resizeBg(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;}
resizeBg();
window.addEventListener('resize',resizeBg);
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*1.5+0.3,
    alpha:Math.random()*0.5+0.1,
    color:Math.random()>0.7?'0,245,255':'255,0,170'
  });
}
function animateBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgCanvas.width;if(p.x>bgCanvas.width)p.x=0;
    if(p.y<0)p.y=bgCanvas.height;if(p.y>bgCanvas.height)p.y=0;
    bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(${p.color},${p.alpha})`;bgCtx.fill();
  });
  requestAnimationFrame(animateBg);
}
animateBg();

// ============ CURSOR TRAIL ============
let mouseX=0,mouseY=0,trailDots=[];
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;addTrail(e.clientX,e.clientY);});
function addTrail(x,y){
  const d=document.createElement('div');
  d.className='cursor-dot';d.style.left=x+'px';d.style.top=y+'px';
  d.style.opacity='0.7';document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),500);},80);
}

// ============ BOOT SEQUENCE ============
const bootMsgs=[
  {t:'> INITIALIZING NEURAL INTERFACE...',c:''},
  {t:'> LOADING APSARA.A PROFILE... <span class="ok">[OK]</span>',c:''},
  {t:'> MAPPING SKILL NODES...',c:''},
  {t:'> COMPILING PROJECT DATA... <span class="ok">[OK]</span>',c:''},
  {t:'> AI SUBSYSTEMS ONLINE... <span class="ok">[OK]</span>',c:''},
  {t:'> NETWORK LINK: GITHUB + LINKEDIN... <span class="ok">[OK]</span>',c:''},
  {t:'> <span class="warn">[INFO] ML PROJECT: IN DEVELOPMENT — ETA 1 MONTH</span>',c:''},
  {t:'> PORTFOLIO READY.',c:''},
];
let bootIdx=0;
const bootBar=document.getElementById('boot-bar');
function runBoot(){
  if(bootIdx>=bootMsgs.length){
    document.getElementById('enter-btn').classList.add('show');
    return;
  }
  const div=document.createElement('div');
  div.className='boot-line';div.innerHTML=bootMsgs[bootIdx].t;
  div.style.animationDelay='0s';
  document.getElementById('boot-lines').appendChild(div);
  bootBar.style.width=((bootIdx+1)/bootMsgs.length*100)+'%';
  bootIdx++;
  setTimeout(runBoot,350);
}
setTimeout(runBoot,600);

function enterPortfolio(){
  document.getElementById('welcome').classList.add('fade');
  setTimeout(()=>document.getElementById('welcome').style.display='none',1000);
}

// ============ NODE GRAPH ============
const nc=document.getElementById('node-canvas');
const ctx=nc.getContext('2d');
let W,H,nodes,edges,hoveredNode=null,animFrame=0;

const NODE_DATA={
  root:{id:'root',x:0.5,y:0.5,r:30,label:'APSARA.A',sub:'MCA Student',color:'#00f5ff',glow:true,children:['about','skills','projects','contact']},
  about:{id:'about',x:0.2,y:0.25,r:22,label:'ABOUT',sub:'Bio & Info',color:'#00f5ff'},
  skills:{id:'skills',x:0.78,y:0.28,r:22,label:'SKILLS',sub:'Tech Stack',color:'#ff00aa'},
  projects:{id:'projects',x:0.2,y:0.72,r:22,label:'PROJECTS',sub:'My Work',color:'#00ff88'},
  contact:{id:'contact',x:0.78,y:0.72,r:22,label:'CONTACT',sub:'Get in Touch',color:'#ff00aa'},
  trustguard:{id:'trustguard',x:0.1,y:0.5,r:15,label:'TRUST\nGUARD',sub:'Security',color:'#00ff88',parent:'projects'},
  mindease:{id:'mindease',x:0.3,y:0.88,r:15,label:'MIND\nEASE',sub:'Stress AI',color:'#00ff88',parent:'projects'},
  outpass:{id:'outpass',x:0.13,y:0.85,r:15,label:'OUT\nPASS',sub:'Hostel',color:'#00ff88',parent:'projects'},
  mlproject:{id:'mlproject',x:0.35,y:0.6,r:15,label:'ML\nPROJECT',sub:'Coming Soon',color:'#ffaa00',parent:'projects'},
};

const EDGES=[
  ['root','about'],['root','skills'],['root','projects'],['root','contact'],
  ['projects','trustguard'],['projects','mindease'],['projects','outpass'],['projects','mlproject'],
];

function resize(){
  const area=document.getElementById('node-area');
  W=nc.width=area.clientWidth;H=nc.height=area.clientHeight;
}
resize();
window.addEventListener('resize',()=>{resize();});

function nx(n){return n.x*W;}
function ny(n){return n.y*H;}

function drawEdge(a,b,alpha){
  const na=NODE_DATA[a],nb=NODE_DATA[b];
  if(!na||!nb)return;
  const ax=nx(na),ay=ny(na),bx=nx(nb),by=ny(nb);
  const grad=ctx.createLinearGradient(ax,ay,bx,by);
  grad.addColorStop(0,na.color+'66');
  grad.addColorStop(1,nb.color+'66');
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
  ctx.strokeStyle=grad;ctx.lineWidth=1;ctx.globalAlpha=alpha||0.4;
  ctx.stroke();ctx.globalAlpha=1;

  // animated dot on edge
  const t=((animFrame*0.005)%1);
  const dx=ax+(bx-ax)*t,dy=ay+(by-ay)*t;
  ctx.beginPath();ctx.arc(dx,dy,2,0,Math.PI*2);
  ctx.fillStyle=na.color;ctx.globalAlpha=0.8;ctx.fill();ctx.globalAlpha=1;
}

function drawNode(n,hovered){
  const x=nx(n),y=ny(n),r=n.r;
  const pulse=Math.sin(animFrame*0.03+n.x*10)*2;

  // glow
  if(n.glow||hovered){
    const g=ctx.createRadialGradient(x,y,0,x,y,r*3+pulse);
    g.addColorStop(0,n.color+'44');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(x,y,r*3+pulse,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  }

  // outer ring
  ctx.beginPath();ctx.arc(x,y,r+(hovered?4:0),0,Math.PI*2);
  ctx.strokeStyle=n.color;ctx.lineWidth=hovered?2:1;
  ctx.globalAlpha=hovered?1:0.7;ctx.stroke();ctx.globalAlpha=1;

  // inner fill
  ctx.beginPath();ctx.arc(x,y,r-4+(hovered?2:0),0,Math.PI*2);
  const fill=ctx.createRadialGradient(x,y,0,x,y,r);
  fill.addColorStop(0,n.color+'22');fill.addColorStop(1,n.color+'08');
  ctx.fillStyle=fill;ctx.fill();

  // rotating dashes for hovered/root
  if(hovered||n.glow){
    ctx.save();ctx.translate(x,y);ctx.rotate(animFrame*0.02);
    ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*0.7);
    ctx.strokeStyle=n.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;ctx.stroke();
    ctx.rotate(Math.PI);ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*0.5);
    ctx.stroke();ctx.restore();ctx.globalAlpha=1;
  }

  // label
  const lines=n.label.split('\n');
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`700 ${n.glow?11:9}px 'Orbitron',sans-serif`;
  if(lines.length===1){
    ctx.fillText(n.label,x,y);
  } else {
    ctx.fillText(lines[0],x,y-6);
    ctx.fillText(lines[1],x,y+6);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  animFrame++;

  EDGES.forEach(([a,b])=>{
    const ha=NODE_DATA[a]===hoveredNode,hb=NODE_DATA[b]===hoveredNode;
    drawEdge(a,b,ha||hb?0.8:0.35);
  });

  Object.values(NODE_DATA).forEach(n=>drawNode(n,n===hoveredNode));
  requestAnimationFrame(draw);
}
draw();

// ============ MOUSE INTERACTION ============
function getNodeAt(x,y){
  return Object.values(NODE_DATA).find(n=>{
    const dx=x-nx(n),dy=y-ny(n);
    return Math.sqrt(dx*dx+dy*dy)<n.r+8;
  })||null;
}

const tooltip=document.getElementById('tooltip');
nc.addEventListener('mousemove',e=>{
  const rect=nc.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const n=getNodeAt(x,y);
  hoveredNode=n;
  nc.style.cursor=n?'pointer':'default';
  if(n){
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-10)+'px';
    tooltip.textContent='[ '+n.label.replace('\n',' ')+' ] — CLICK TO OPEN';
  } else {tooltip.style.display='none';}
});
nc.addEventListener('click',e=>{
  const rect=nc.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const n=getNodeAt(x,y);
  if(n)openPanel(n.id);
});
nc.addEventListener('mouseleave',()=>{hoveredNode=null;tooltip.style.display='none';});

  mindease:{
    tag:'// PROJECT_002 //',title:'MINDEASE',sub:'Stress Analysis System for IT Employees',
    html:`
      <div class="p-section">
        <div class="p-label">OVERVIEW</div>
        <p class="p-text">MindEase is a <b style="color:var(--magenta)">stress analyzing system</b> designed specifically for IT employees — a group chronically exposed to burnout and high-pressure environments. The system detects and monitors stress patterns and provides actionable mental wellness insights.</p>
      </div>
      <div class="p-section">
        <div class="p-label">PROBLEM SOLVED</div>
        <p class="p-text" style="font-family:var(--font-mono);font-size:12px;color:var(--textdim);line-height:1.8;">IT professionals face unique stress triggers — deadlines, on-call duties, context-switching. MindEase uses behavioral and physiological signals to proactively surface stress before it becomes burnout.</p>
      </div>
      <div class="p-section">

function openPanel(id){
  const data=PANEL_CONTENT[id]||PANEL_CONTENT['root'];
  document.getElementById('panel-tag').textContent=data.tag;
  document.getElementById('panel-title').textContent=data.title;
  document.getElementById('panel-subtitle').textContent=data.sub;
  document.getElementById('panel-body').innerHTML=data.html;
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('status-msg').textContent='NODE: '+data.title+' — LOADED';
}
function closePanel(){
  document.getElementById('panel').classList.add('hidden');
  document.getElementById('status-msg').textContent='SELECT A NODE TO EXPLORE';
}

// Auto open root panel after boot
setTimeout(()=>{ if(document.getElementById('welcome').style.display==='none') openPanel('root'); },1500);
